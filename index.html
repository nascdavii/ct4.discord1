<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Central X</title>
  <meta name="description" content="Fast, fluid and competitive gameplay awaits inside.">
  
  <!-- Preconnections for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.youtube.com">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #0a1410;
      --card-bg: #14261c;
      --border-color: rgba(255, 255, 255, 0.06);
      --accent-green: #34e074;
      --accent-hover: #28c065;
      --text-primary: #e8ebe9;
      --text-secondary: #8a9a91;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .header {
      text-align: center;
    }

    .title {
      color: var(--accent-green);
      font-size: 32px;
      font-weight: 700;
      margin: 0;
      letter-spacing: -0.02em;
    }

    /* Grid layout: 2 cols on desktop, 1 col on mobile */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 640px) {
      .video-grid {
        grid-template-columns: 1fr;
      }
      .container {
        padding: 24px 16px;
        gap: 24px;
      }
    }

    /* Video card styling */
    .video-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s ease;
    }

    .video-card:hover {
      border-color: rgba(52, 224, 116, 0.3);
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 8px;
      overflow: hidden;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* CTA Card styling */
    .cta-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .cta-subtitle {
      font-size: 15px;
      font-weight: 400;
      color: var(--text-secondary);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    .cta-btn {
      display: inline-block;
      background-color: var(--accent-green);
      color: var(--bg-color);
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 12px 28px;
      border-radius: 999px;
      cursor: pointer;
      outline: none;
    }

    /* Accessibility focus visible state */
    .cta-btn:focus-visible,
    a:focus-visible {
      outline: 2px solid var(--accent-green);
      outline-offset: 4px;
    }

    /* Reduced motion respected */
    @media (prefers-reduced-motion: no-preference) {
      .cta-btn {
        transition: transform 150ms ease, background-color 150ms ease;
      }
      
      .cta-btn:hover {
        background-color: var(--accent-hover);
        transform: translateY(-1px);
      }

      .footer-link {
        transition: color 150ms ease;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .cta-btn:hover {
        background-color: var(--accent-hover);
      }
    }

    /* Footer styling */
    footer {
      margin-top: auto;
      padding: 40px 20px 24px 20px;
      text-align: center;
      font-size: 13px;
      font-weight: 400;
    }

    .footer-copyright {
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .footer-link {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .footer-link:hover {
      color: var(--accent-green);
    }

    .footer-separator {
      color: var(--border-color);
      user-select: none;
    }
  </style>
</head>
<body>

  <main class="container">
    <!-- Header Title -->
    <header class="header">
      <h1 class="title">Central X</h1>
    </header>

    <!-- Grid of 4 YouTube videos -->
    <section class="video-grid" aria-label="Vídeos em Destaque">
      <div class="video-card" id="card-video-1">
        <div class="video-wrapper">
          <iframe 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            title="Vídeo 1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen 
            loading="lazy">
          </iframe>
        </div>
      </div>

      <div class="video-card" id="card-video-2">
        <div class="video-wrapper">
          <iframe 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            title="Vídeo 2" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen 
            loading="lazy">
          </iframe>
        </div>
      </div>

      <div class="video-card" id="card-video-3">
        <div class="video-wrapper">
          <iframe 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            title="Vídeo 3" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen 
            loading="lazy">
          </iframe>
        </div>
      </div>

      <div class="video-card" id="card-video-4">
        <div class="video-wrapper">
          <iframe 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
            title="Vídeo 4" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen 
            loading="lazy">
          </iframe>
        </div>
      </div>
    </section>

    <!-- Card CTA -->
    <section class="cta-card" id="card-cta">
      <p class="cta-subtitle">Fast, fluid and competitive gameplay awaits inside.</p>
      <a href="#" class="cta-btn" id="btn-join" aria-label="Join the Community">Join the Community</a>
    </section>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-copyright">
      &copy; 2026 All rights reserved.
    </div>
    <nav class="footer-links" aria-label="Links Rodapé">
      <a href="termos.html" class="footer-link" id="link-termos">Termos</a>
      <span class="footer-separator">&bull;</span>
      <a href="disclaimer.html" class="footer-link" id="link-disclaimer">Disclaimer</a>
      <span class="footer-separator">&bull;</span>
      <a href="privacidade.html" class="footer-link" id="link-privacidade">Política de Privacidade</a>
    </nav>
  </footer>

</body>
</html>
